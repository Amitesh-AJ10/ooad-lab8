<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management System</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Student Registration Form</h1>

    <div th:if="${param.error}" class="error">
        Error: Duplicate email registration not allowed!
    </div>

    <form th:action="@{/api/students}" th:object="${student}" method="POST">
        <label>Name:</label><br>
        <input type="text" th:field="*{name}" required><br><br>

        <label>Email:</label><br>
        <input type="email" th:field="*{email}" required><br><br>

        <label>Course:</label><br>
        <input type="text" th:field="*{course}" required><br><br>

        <button type="submit">Submit</button>
    </form>

    <hr>

    <h1>Student List Table</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.course}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
